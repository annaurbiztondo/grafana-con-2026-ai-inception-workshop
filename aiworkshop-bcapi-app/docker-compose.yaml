services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    volumes:
      - ../../aiworkshop-bcapi-datasource/dist:/var/lib/grafana/plugins/aiworkshop-bcapi-datasource
    environment:
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: aiworkshop-bcapi-app,aiworkshop-bcapi-datasource
